<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firulais Pet Care - Loving Pet Care</title>
    <meta name="description" content="At Firulais Pet Care, we pamper and look after your best friend with the love and dedication they deserve. Visit us!">
    <link rel="icon" type="image/x-icon" href="assets/ico.ico">
    <!-- Google Fonts: Fredoka (rounded, friendly) and Outfit (modern, clean) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Header Navigation -->
    <header class="main-header">
        <div class="header-container">
            <a href="#" class="brand-logo">
                <img src="assets/logo-mini.png" alt="Firulais Pet Care Mini Logo" class="brand-mini-logo">
                <span class="brand-text">Firulais Pet Care</span>
            </a>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#" class="nav-link active">Home</a></li>
                    <li><a href="#" class="nav-link">About Us</a></li>
                    <li><a href="#" class="nav-link">Services</a></li>
                    <li><a href="#" class="nav-link">Contact</a></li>
                </ul>
            </nav>
            <div class="header-cta">
                <a href="#" class="btn-cta">Book Appointment</a>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section" id="hero">
        <!-- Walking Paw Prints in the Background -->
        <div class="paw-prints-container">
            <div class="paw-holder paw-1">
                <img src="assets/huella.png" alt="Huella" class="paw-print">
            </div>
            <div class="paw-holder paw-2">
                <img src="assets/huella.png" alt="Huella" class="paw-print">
            </div>
            <div class="paw-holder paw-3">
                <img src="assets/huella.png" alt="Huella" class="paw-print">
            </div>
            <div class="paw-holder paw-5">
                <img src="assets/huella.png" alt="Huella" class="paw-print">
            </div>
            <div class="paw-holder paw-4">
                <img src="assets/huella.png" alt="Huella" class="paw-print">
            </div>
            <div class="paw-holder paw-6">
                <img src="assets/huella.png" alt="Huella" class="paw-print">
            </div>
            <div class="paw-holder paw-7">
                <img src="assets/huella.png" alt="Huella" class="paw-print">
            </div>
            <div class="paw-holder paw-8">
                <img src="assets/huella.png" alt="Huella" class="paw-print">
            </div>
        </div>

        <div class="hero-container">
            <!-- Left Column: Dog Image with Video Mask -->
            <div class="dog-parallax">
                <div class="dog-wrapper" id="dogWrapper">
                    <!-- Static fallback dog image -->
                    <img src="assets/perro.png" alt="Firulais Dog Static" class="dog-image" id="dogImage">
                    <!-- Masked video container -->
                    <div class="dog-video-mask" id="dogVideoMask">
                        <video class="dog-video" id="dogVideo" muted playsinline>
                            <source src="assets/video1.mp4" type="video/mp4">
                        </video>
                    </div>
                </div>
            </div>

            <!-- Right Column: Logo/Badge, Slogan, CTAs & Services -->
            <div class="logo-parallax">
                <div class="logo-wrapper">
                    <img src="assets/logo.png" alt="Firulais Pet Care Logo" class="logo-image">
                    <span class="logo-subtitle">by Evan & Gladys</span>
                    <p class="logo-slogan">Fun, safe & loving pet care in Hobart</p>
                    <div class="logo-ctas">
                        <a href="#" class="btn-primary">Book Your First Walk</a>
                        <a href="#" class="btn-secondary">Meet Evan & Gladys</a>
                    </div>
                    <div class="logo-services">
                        <span>Pet Sitting</span>
                        <span class="divider">|</span>
                        <span>Dog Walking</span>
                        <span class="divider">|</span>
                        <span>Feeding</span>
                        <span class="divider">|</span>
                        <span>Lots of Love</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Main JavaScript for interactions and mouse trail -->
    <script src="script.js"></script>
</body>
</html>
